name: V2 Signed Production Dispatch Quality

on:
  pull_request:
    paths:
      - ".github/workflows/v2-production-dispatch-quality.yml"
      - "scripts/v2/production/fixed-channel/**"
      - "docs/governance/production-fixed-dispatch-channel.v1.json"
      - "package.json"
  push:
    paths:
      - ".github/workflows/v2-production-dispatch-quality.yml"
      - "scripts/v2/production/fixed-channel/**"
      - "docs/governance/production-fixed-dispatch-channel.v1.json"
      - "package.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: v2-production-dispatch-quality-${{ github.ref }}
  cancel-in-progress: false

jobs:
  signed-dispatch-quality:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Checkout exact source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Reject forbidden tracked files
        run: npm run ci:forbidden-files

      - name: Reject tracked secret patterns
        run: npm run ci:secret-patterns

      - name: Verify signed pull-only dispatch
        run: npm run test:production-dispatch

      - name: Prove this job has no production authority
        run: |
          echo "quality_only=true"
          echo "production_dispatch_publish=false"
          echo "production_execution=false"
