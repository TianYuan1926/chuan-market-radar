name: Market Radar Production Governance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "dry_run only validates gates and evidence. production_deploy requires explicit confirmation."
        required: true
        default: dry_run
        type: choice
        options:
          - dry_run
          - production_prepare
          - production_deploy
      confirm_deploy:
        description: "Type DEPLOY_PRODUCTION to allow production_deploy. Other values keep dry-run behavior."
        required: false
        default: ""
      target_url:
        description: "Production base URL for read-only checks. Leave blank for dry-run."
        required: false
        default: ""

permissions:
  contents: read

concurrency:
  group: market-radar-production-governance
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Forbidden file guard
        run: npm run ci:forbidden-files

      - name: Secret pattern guard
        run: npm run ci:secret-patterns

      - name: G0 HTTPS and private-session local gate
        run: npm run g0:https-session:validate

      - name: G0 release-record schema gate
        run: npm run g0:release-record:validate

      - name: G0 known-incident registry gate
        run: npm run g0:known-issues:validate

      - name: G0 security release and incident closeout contract
        run: npm run g0:closeout:validate

      - name: Candidate fresh-cycle lineage capture contract
        run: npm run candidate:lineage-capture:validate

      - name: Candidate fresh-cycle lineage capture tests
        run: npm run test:candidate-lineage-capture

      - name: Candidate lineage production packet contract
        run: npm run candidate:lineage-production:validate

      - name: Candidate lineage production packet tests
        run: npm run test:candidate-lineage-production-packet

      - name: Candidate reconciliation production packet contract
        run: npm run candidate:reconciliation-production:validate

      - name: Candidate reconciliation production packet tests
        run: npm run test:candidate-reconciliation-production-packet

      - name: Candidate shadow-verify code authorization contract
        run: npm run candidate:shadow-verify-code-authorization:validate

      - name: Candidate shadow-verify code authorization tests
        run: npm run test:candidate-shadow-verify-code-authorization

      - name: Candidate shadow-verify Web-only release contract
        run: npm run candidate:shadow-verify-code-release:validate

      - name: Candidate shadow-verify Web-only release tests
        run: npm run test:candidate-shadow-verify-code-release

      - name: Candidate shadow-verify phase transition contract
        run: npm run candidate:shadow-verify-phase:validate

      - name: Candidate shadow-verify phase transition tests
        run: npm run test:candidate-shadow-verify-phase

      - name: Candidate canonical-compat phase transition contract
        run: npm run candidate:canonical-compat-phase:validate

      - name: Candidate canonical-compat phase transition tests
        run: npm run test:candidate-canonical-compat-phase

      - name: Candidate validation-cycle continuation contract
        run: npm run candidate:cycle-continuation:validate

      - name: Candidate validation-cycle continuation tests
        run: npm run test:candidate-cycle-continuation && npm run test:candidate-cycle-continuation-governance

      - name: Candidate validation-cycle continuation production packet contract
        run: npm run candidate:cycle-continuation-production-packet:validate

      - name: Candidate validation-cycle continuation production packet tests
        run: npm run test:candidate-cycle-continuation-production-packet

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Market tests
        run: npm run test:market

      - name: Build
        run: npm run build

      - name: Light backtest
        run: npm run backtest:golden

      - name: Security check
        run: npm run security:check

  production-observability:
    name: Production observability dry-run
    runs-on: ubuntu-latest
    needs: quality-gate
    timeout-minutes: 15
    env:
      PHASE4_OUTPUT_DIR: phase4-production-observability
      MARKET_RADAR_BASE_URL: ${{ inputs.target_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate production evidence dry-run
        run: npm run production:evidence -- --dry-run

      - name: Upload dry-run evidence
        uses: actions/upload-artifact@v4
        with:
          name: market-radar-production-observability-dry-run
          path: phase4-production-observability/
          if-no-files-found: error

  production-deploy-gate:
    name: Manual production deploy gate
    runs-on: ubuntu-latest
    needs:
      - quality-gate
      - production-observability
    if: ${{ inputs.mode == 'production_deploy' }}
    timeout-minutes: 5
    steps:
      - name: Require explicit deploy confirmation
        run: |
          if [ "${{ inputs.confirm_deploy }}" != "DEPLOY_PRODUCTION" ]; then
            echo "Production deploy blocked: confirm_deploy must be DEPLOY_PRODUCTION."
            exit 1
          fi
          echo "Production deploy confirmation accepted."

      - name: Stop before real deployment
        run: |
          echo "This workflow intentionally does not SSH or deploy by default."
          echo "Use the documented self-hosted runner or server-side script after explicit user approval."
          exit 1
