name: Market Radar Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: market-radar-production
  cancel-in-progress: false

jobs:
  validate:
    name: Test and build
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Forbidden file guard
        run: npm run ci:forbidden-files

      - name: Secret pattern guard
        run: npm run ci:secret-patterns

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Market tests
        run: npm run test:market

      - name: Build
        run: npm run build

      - name: Light backtest
        run: npm run backtest:golden

      - name: Security check
        run: bash scripts/verify/security-check.sh

  deploy:
    name: Deploy Tencent production
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 35
    env:
      TENCENT_HOST: ${{ secrets.TENCENT_HOST }}
      TENCENT_USER: ${{ secrets.TENCENT_USER }}
      TENCENT_PORT: ${{ secrets.TENCENT_PORT }}
      TENCENT_APP_DIR: ${{ secrets.TENCENT_APP_DIR }}
      TENCENT_SSH_KEY: ${{ secrets.TENCENT_SSH_KEY }}
      PRODUCTION_BASE_URL: ${{ secrets.PRODUCTION_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          test -n "${TENCENT_HOST}"
          test -n "${TENCENT_USER}"
          test -n "${TENCENT_SSH_KEY}"
          test -n "${PRODUCTION_BASE_URL}"
          echo "deployment secrets present"

      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${TENCENT_SSH_KEY}" > ~/.ssh/market-radar-prod
          chmod 600 ~/.ssh/market-radar-prod
          ssh-keyscan -p "${TENCENT_PORT:-22}" "${TENCENT_HOST}" >> ~/.ssh/known_hosts

      - name: Remote deploy with rollback
        run: |
          port="${TENCENT_PORT:-22}"
          app_dir="${TENCENT_APP_DIR:-/home/ubuntu/apps/chuan-market-radar}"
          ssh -p "${port}" -i ~/.ssh/market-radar-prod "${TENCENT_USER}@${TENCENT_HOST}" \
            "cd '${app_dir}' && \
             git fetch origin main && \
             git checkout main && \
             git pull --ff-only origin main && \
             chmod +x scripts/deploy/auto-deploy.sh scripts/deploy/rollback.sh scripts/verify/production-check.sh scripts/audit/collect-production-facts.sh && \
             BASE_URL='${PRODUCTION_BASE_URL}' AUTO_ROLLBACK=true STRICT_SCAN_FRESHNESS=true RUN_PRODUCTION_FACTS=true bash scripts/deploy/auto-deploy.sh"

      - name: Download production evidence artifact
        run: |
          port="${TENCENT_PORT:-22}"
          app_dir="${TENCENT_APP_DIR:-/home/ubuntu/apps/chuan-market-radar}"
          remote_path="$(ssh -p "${port}" -i ~/.ssh/market-radar-prod "${TENCENT_USER}@${TENCENT_HOST}" "cd '${app_dir}' && ls -t reports/production-facts/production-facts-*.tar.gz | head -1")"
          test -n "${remote_path}"
          scp -P "${port}" -i ~/.ssh/market-radar-prod "${TENCENT_USER}@${TENCENT_HOST}:${app_dir}/${remote_path}" ./production-facts.tar.gz

      - name: Upload production evidence artifact
        uses: actions/upload-artifact@v4
        with:
          name: market-radar-production-facts
          path: production-facts.tar.gz
          if-no-files-found: error
