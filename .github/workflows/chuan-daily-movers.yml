name: Chuan Daily Mover Ingest

on:
  schedule:
    - cron: "17 0 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: chuan-daily-mover-ingest
  cancel-in-progress: false

jobs:
  daily-movers:
    name: Trigger protected daily mover ingest
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Call Chuan daily mover ingest API
        env:
          CHUAN_DAILY_MOVER_INGEST_URL: ${{ secrets.CHUAN_DAILY_MOVER_INGEST_URL }}
          CHUAN_CRON_SECRET: ${{ secrets.CHUAN_CRON_SECRET }}
        run: |
          # CHUAN_DAILY_MOVER_INGEST_URL should point to /api/admin/daily-movers/ingest.
          test -n "$CHUAN_DAILY_MOVER_INGEST_URL"
          test -n "$CHUAN_CRON_SECRET"
          curl --fail --show-error --silent --retry 2 --retry-delay 10 --max-time 240 \
            -X POST "$CHUAN_DAILY_MOVER_INGEST_URL" \
            -H "Authorization: Bearer $CHUAN_CRON_SECRET" \
            -H "Content-Type: application/json"
