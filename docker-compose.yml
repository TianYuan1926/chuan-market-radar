name: chuan-market-radar

x-app-env: &app-env
  NODE_ENV: production
  NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-川}
  MARKET_DATA_PROVIDER: ${MARKET_DATA_PROVIDER:-coinglass}
  SCAN_API_RATE_LIMIT: ${SCAN_API_RATE_LIMIT:-120}
  JOURNAL_API_RATE_LIMIT: ${JOURNAL_API_RATE_LIMIT:-60}
  RADAR_API_RATE_LIMIT: ${RADAR_API_RATE_LIMIT:-120}
  RADAR_CONTRACT_API_RATE_LIMIT: ${RADAR_CONTRACT_API_RATE_LIMIT:-120}
  RADAR_DOSSIER_API_RATE_LIMIT: ${RADAR_DOSSIER_API_RATE_LIMIT:-180}
  FRONTEND_LIVE_EVENTS_RATE_LIMIT: ${FRONTEND_LIVE_EVENTS_RATE_LIMIT:-180}
  FRONTEND_UI_STATE_RATE_LIMIT: ${FRONTEND_UI_STATE_RATE_LIMIT:-180}
  FRONTEND_UI_STATE_MAX_BYTES: ${FRONTEND_UI_STATE_MAX_BYTES:-32768}
  PERSISTENCE_SCOPE: ${PERSISTENCE_SCOPE:-chuan-prod}
  DATABASE_DRIVER: postgres
  DATABASE_URL: postgresql://${POSTGRES_USER:?Set POSTGRES_USER}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:?Set POSTGRES_DB}
  REDIS_URL: redis://redis:6379
  CRON_SECRET: ${CRON_SECRET:?Set CRON_SECRET}
  COINGLASS_API_KEY: ${COINGLASS_API_KEY:?Set COINGLASS_API_KEY}
  COINGLASS_BASE_ASSETS: ${COINGLASS_BASE_ASSETS:-BTC,ETH,SOL,ENA,SUI,ONDO,TIA}
  COINGLASS_BATCH_SIZE: ${COINGLASS_BATCH_SIZE:-24}
  COINGLASS_DAILY_REQUEST_BUDGET: ${COINGLASS_DAILY_REQUEST_BUDGET:-3000}
  COINGLASS_MAX_CONCURRENCY: ${COINGLASS_MAX_CONCURRENCY:-6}
  COINGLASS_MINUTE_REQUEST_LIMIT: ${COINGLASS_MINUTE_REQUEST_LIMIT:-30}
  COINGLASS_REQUEST_INTERVAL_MS: ${COINGLASS_REQUEST_INTERVAL_MS:-3000}
  SCAN_LOCK_TTL_SECONDS: ${SCAN_LOCK_TTL_SECONDS:-600}
  COINGLASS_DAILY_MOVER_MAX_ASSETS: ${COINGLASS_DAILY_MOVER_MAX_ASSETS:-30}
  COINGLASS_DAILY_MOVER_LIMIT_PER_SIDE: ${COINGLASS_DAILY_MOVER_LIMIT_PER_SIDE:-10}
  WS_LIGHT_SCAN_WINDOW_MS: ${WS_LIGHT_SCAN_WINDOW_MS:-900000}
  WS_LIGHT_SCAN_ZSCORE_THRESHOLD: ${WS_LIGHT_SCAN_ZSCORE_THRESHOLD:-2}
  WS_LIGHT_SCAN_MIN_CANDIDATE_VOLUME_USD: ${WS_LIGHT_SCAN_MIN_CANDIDATE_VOLUME_USD:-250000}
  WS_LIGHT_SCAN_ENABLED: ${WS_LIGHT_SCAN_ENABLED:-true}
  WS_LIGHT_SCAN_WORKER_ENABLED: ${WS_LIGHT_SCAN_WORKER_ENABLED:-true}
  WS_LIGHT_SCAN_EXCHANGES: ${WS_LIGHT_SCAN_EXCHANGES:-BINANCE,OKX,BYBIT}
  WS_LIGHT_SCAN_BOOK_STREAMS_ENABLED: ${WS_LIGHT_SCAN_BOOK_STREAMS_ENABLED:-true}
  WS_LIGHT_SCAN_LARGE_TAKER_TRADE_USD: ${WS_LIGHT_SCAN_LARGE_TAKER_TRADE_USD:-100000}
  WS_LIGHT_SCAN_REDIS_KEY: ${WS_LIGHT_SCAN_REDIS_KEY:-chuan:ws-light-scan:snapshot}
  WS_LIGHT_SCAN_STALE_AFTER_MS: ${WS_LIGHT_SCAN_STALE_AFTER_MS:-180000}
  WS_LIGHT_SCAN_SNAPSHOT_INTERVAL_SECONDS: ${WS_LIGHT_SCAN_SNAPSHOT_INTERVAL_SECONDS:-15}
  WS_LIGHT_SCAN_SNAPSHOT_TTL_SECONDS: ${WS_LIGHT_SCAN_SNAPSHOT_TTL_SECONDS:-1200}
  WS_LIGHT_SCAN_SYMBOL_LIMIT_PER_EXCHANGE: ${WS_LIGHT_SCAN_SYMBOL_LIMIT_PER_EXCHANGE:-500}
  WS_LIGHT_SCAN_SUBSCRIBE_CHUNK_SIZE: ${WS_LIGHT_SCAN_SUBSCRIBE_CHUNK_SIZE:-40}
  WS_LIGHT_SCAN_MAX_PRIORITY_CANDIDATES: ${WS_LIGHT_SCAN_MAX_PRIORITY_CANDIDATES:-48}
  WS_LIGHT_SCAN_RECONNECT_SECONDS: ${WS_LIGHT_SCAN_RECONNECT_SECONDS:-10}
  WORKER_HEARTBEAT_TTL_SECONDS: ${WORKER_HEARTBEAT_TTL_SECONDS:-1800}
  WORKER_HEARTBEAT_STALE_SECONDS: ${WORKER_HEARTBEAT_STALE_SECONDS:-900}
  WORKER_IDLE_HEARTBEAT_SECONDS: ${WORKER_IDLE_HEARTBEAT_SECONDS:-300}
  KLINE_BACKTEST_DAILY_REQUEST_BUDGET: ${KLINE_BACKTEST_DAILY_REQUEST_BUDGET:-12}
  KLINE_BACKTEST_MAX_SYMBOLS_PER_RUN: ${KLINE_BACKTEST_MAX_SYMBOLS_PER_RUN:-2}
  OUTCOME_EXECUTOR_EVENT_LIMIT: ${OUTCOME_EXECUTOR_EVENT_LIMIT:-80}
  V3_FORWARD_MAP_REVIEW_LIMIT: ${V3_FORWARD_MAP_REVIEW_LIMIT:-80}
  MACRO_INGEST_INTERVAL_SECONDS: ${MACRO_INGEST_INTERVAL_SECONDS:-3600}
  STRATEGY_WEIGHT_ACTIVATION_MODE: ${STRATEGY_WEIGHT_ACTIVATION_MODE:-disabled}
  AI_REVIEW_ENABLED: ${AI_REVIEW_ENABLED:-false}
  AI_PROVIDER: ${AI_PROVIDER:-}
  AI_API_KEY: ${AI_API_KEY:-}
  AI_BASE_URL: ${AI_BASE_URL:-}
  AI_MODEL: ${AI_MODEL:-}
  AI_REVIEW_MAX_SIGNALS: ${AI_REVIEW_MAX_SIGNALS:-3}
  AI_REVIEW_MAX_PROMPT_CHARS: ${AI_REVIEW_MAX_PROMPT_CHARS:-12000}
  CANDIDATE_EPISODE_CANONICAL_WRITE: ${CANDIDATE_EPISODE_CANONICAL_WRITE:-false}
  CANDIDATE_EPISODE_SHADOW_WRITE: ${CANDIDATE_EPISODE_SHADOW_WRITE:-false}
  CANDIDATE_EPISODE_DRAIN_ONLY: ${CANDIDATE_EPISODE_DRAIN_ONLY:-false}
  CANDIDATE_EPISODE_DUAL_READ: ${CANDIDATE_EPISODE_DUAL_READ:-false}
  CANDIDATE_EPISODE_CANONICAL_READ: ${CANDIDATE_EPISODE_CANONICAL_READ:-false}
  CANDIDATE_EPISODE_REVIEW_READ: ${CANDIDATE_EPISODE_REVIEW_READ:-false}
  CANDIDATE_RUNTIME_RELEASE_ID: ${CANDIDATE_RUNTIME_RELEASE_ID:-disabled}
  CANDIDATE_RUNTIME_MIGRATION_ID: ${CANDIDATE_RUNTIME_MIGRATION_ID:-candidate-episode-v1}
  CANDIDATE_SHADOW_WORKER_EXPECTED: ${CANDIDATE_SHADOW_WORKER_EXPECTED:-false}
  CANDIDATE_SHADOW_BATCH_LIMIT: ${CANDIDATE_SHADOW_BATCH_LIMIT:-50}

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?Set POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER:?Set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
      TZ: Asia/Shanghai
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      <<: *app-env
      PORT: 3000
      HOSTNAME: 0.0.0.0
      AUTH_SESSION_RATE_LIMIT: ${AUTH_SESSION_RATE_LIMIT:-30}
      CHUAN_PRIVATE_MODE_ENABLED: ${CHUAN_PRIVATE_MODE_ENABLED:-false}
      CHUAN_SESSION_COOKIE_NAME: ${CHUAN_SESSION_COOKIE_NAME:-chuan_session}
      CHUAN_SESSION_PASSWORD: ${CHUAN_SESSION_PASSWORD:-}
      CHUAN_SESSION_SECRET: ${CHUAN_SESSION_SECRET:-}
      CHUAN_SESSION_SECRET_PREVIOUS: ${CHUAN_SESSION_SECRET_PREVIOUS:-}
      CHUAN_SESSION_TTL_SECONDS: ${CHUAN_SESSION_TTL_SECONDS:-604800}
      CANDIDATE_SOURCE_DATABASE_URL: ${CANDIDATE_SOURCE_DATABASE_URL:-}
      CANDIDATE_CONSUMER_DATABASE_URL: ${CANDIDATE_CONSUMER_DATABASE_URL:-}
      CANDIDATE_MONITOR_DATABASE_URL: ${CANDIDATE_MONITOR_DATABASE_URL:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - reports-data:/app/reports
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\"",
        ]
      interval: 30s
      timeout: 10s
      retries: 10

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      CHUAN_PUBLIC_HOST: ${CHUAN_PUBLIC_HOST:-:80}
      CHUAN_HSTS_MAX_AGE: ${CHUAN_HSTS_MAX_AGE:-0}
      CHUAN_TRUSTED_PRIVATE_NETWORK: ${CHUAN_TRUSTED_PRIVATE_NETWORK:-false}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      web:
        condition: service_healthy

  scanner-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/protected-api-worker.mjs", "scanner"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      SCANNER_INTERVAL_SECONDS: ${SCANNER_INTERVAL_SECONDS:-900}
    depends_on:
      web:
        condition: service_healthy

  websocket-light-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/ws-light-scan-worker.mjs"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
    depends_on:
      redis:
        condition: service_healthy
      web:
        condition: service_healthy

  coinglass-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/protected-api-worker.mjs", "coinglass"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      DAILY_MOVER_INTERVAL_SECONDS: ${DAILY_MOVER_INTERVAL_SECONDS:-86400}
      KLINE_CACHE_INTERVAL_SECONDS: ${KLINE_CACHE_INTERVAL_SECONDS:-21600}
    depends_on:
      web:
        condition: service_healthy

  signal-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/protected-api-worker.mjs", "signal"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      OUTCOME_INTERVAL_SECONDS: ${OUTCOME_INTERVAL_SECONDS:-3600}
      V3_FORWARD_MAP_INTERVAL_SECONDS: ${V3_FORWARD_MAP_INTERVAL_SECONDS:-21600}
    depends_on:
      web:
        condition: service_healthy

  candidate-shadow-worker:
    profiles: ["candidate-shadow-runtime"]
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/protected-api-worker.mjs", "candidate-shadow"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      CANDIDATE_SHADOW_INTERVAL_SECONDS: ${CANDIDATE_SHADOW_INTERVAL_SECONDS:-30}
    depends_on:
      web:
        condition: service_healthy

  shadow-runner:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command:
      [
        "node",
        ".tmp/market-tests/scripts/shadow/shadow-tracking.js",
        "run-loop",
        "--out-dir",
        "${SHADOW_REPORTS_DIR:-/app/reports/phase5-1-1-tencent-shadow-runner-start/shadow}",
        "--run-id",
        "${SHADOW_RUN_ID:-shadow-v1-20260707T182114Z}",
        "--base-url",
        "${SHADOW_PRODUCTION_BASE_URL:-http://web:3000}",
        "--commit",
        "${SHADOW_PRODUCTION_COMMIT:-unknown}",
        "--evidence-validate",
        "${SHADOW_PRODUCTION_EVIDENCE_VALIDATE:-pass}",
        "--health",
        "${SHADOW_PRODUCTION_HEALTH:-pass}",
      ]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      SHADOW_REPORTS_DIR: ${SHADOW_REPORTS_DIR:-/app/reports/phase5-1-1-tencent-shadow-runner-start/shadow}
      SHADOW_RUN_ID: ${SHADOW_RUN_ID:-shadow-v1-20260707T182114Z}
      SHADOW_CAPTURE_INTERVAL_MS: ${SHADOW_CAPTURE_INTERVAL_MS:-300000}
      SHADOW_FETCH_TIMEOUT_MS: ${SHADOW_FETCH_TIMEOUT_MS:-12000}
      SHADOW_RUNNER_HEARTBEAT_STALE_MS: ${SHADOW_RUNNER_HEARTBEAT_STALE_MS:-600000}
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - reports-data:/app/reports

  dynamic-scan-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/protected-api-worker.mjs", "dynamic"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      HEALTH_WATCH_INTERVAL_SECONDS: ${HEALTH_WATCH_INTERVAL_SECONDS:-300}
    depends_on:
      web:
        condition: service_healthy

  macro-worker:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    command: ["node", "deploy/workers/protected-api-worker.mjs", "macro"]
    environment:
      <<: *app-env
      APP_INTERNAL_URL: http://web:3000
      MACRO_INGEST_INTERVAL_SECONDS: ${MACRO_INGEST_INTERVAL_SECONDS:-3600}
    depends_on:
      web:
        condition: service_healthy

volumes:
  caddy-config:
  caddy-data:
  postgres-data:
  reports-data:
  redis-data:
